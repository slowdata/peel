name: weekly peel run

on:
  schedule:
    # Domingo às 22:00 UTC (antes da segunda-feira)
    - cron: "0 22 * * 0"
  # Dispatch manual para testes durante desenvolvimento
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 necessário para git log, commits, etc.
          fetch-depth: 0

      - name: setup uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"

      - name: install dependencies
        run: uv sync --all-groups

      - name: run tests
        run: uv run pytest
        # Se os testes falharem, o workflow para aqui (não corre peel)

      - name: run peel
        run: uv run peel
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          PEEL_PLAYLIST_ID: ${{ secrets.PEEL_PLAYLIST_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: commit state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "peel-bot"
          git config user.email "peel-bot@users.noreply.github.com"
          git add data/peel.db
          # Só comita se houver mudanças (não falha se DB não mudou)
          git diff --cached --quiet || git commit -m "chore: weekly peel state update"
          git push
